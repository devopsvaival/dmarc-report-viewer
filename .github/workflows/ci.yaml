  docker_linux:
    name: Docker (Linux, x86-64)
    needs: [linux_x86_64]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Download Artifacts
      uses: actions/download-artifact@v8
      with:
        name: linux-x86_64
        path: .github/docker/linux-amd64
    - name: Prepare Binary Artifacts
      run: chmod +x .github/docker/linux-amd64/dmarc-report-viewer
    - name: Build Docker Images
      run: |
        cd .github/docker/
        docker builder create --name builder
        docker buildx build --builder builder --platform=linux/amd64 --pull .
    - name: Build & Push Develop Docker Images
      if: ${{github.ref == 'refs/heads/master'}}
      run: |
        cd .github/docker/
        echo ${{secrets.GITHUB_TOKEN}} | docker login ghcr.io -u ${{github.actor}} --password-stdin
        docker buildx build --builder builder --platform=linux/amd64 --pull --push \
          --tag ghcr.io/${{github.actor}}/dmarc-report-viewer:develop .
        docker run --rm ghcr.io/${{github.actor}}/dmarc-report-viewer:develop ./dmarc-report-viewer --version
    - name: Build & Push Release Docker Images
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        cd .github/docker/
        echo ${{secrets.GITHUB_TOKEN}} | docker login ghcr.io -u ${{github.actor}} --password-stdin
        docker buildx build --builder builder --platform=linux/amd64 --pull --push \
          --tag ghcr.io/${{github.actor}}/dmarc-report-viewer:latest \
          --tag ghcr.io/${{github.actor}}/dmarc-report-viewer:$(cut -d '.' -f 1 <<< "${{github.ref_name}}") \
          --tag ghcr.io/${{github.actor}}/dmarc-report-viewer:$(cut -d '.' -f 1,2 <<< "${{github.ref_name}}") \
          --tag ghcr.io/${{github.actor}}/dmarc-report-viewer:${{github.ref_name}} .
        docker run --rm ghcr.io/${{github.actor}}/dmarc-report-viewer:latest ./dmarc-report-viewer --version
  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [linux_x86_64, docker_linux]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Download Artifacts
      uses: actions/download-artifact@v8
      with:
        name: linux-x86_64
        path: linux-x86_64
    - name: Pack Artifacts for Release
      run: zip -r linux-x86_64.zip linux-x86_64
    - name: Publish Release
      uses: softprops/action-gh-release@v2
      with:
        body: Release created automatically from git tag ${{github.ref_name}}, see CHANGELOG.md for more details.
        files: |
          CHANGELOG.md
          LICENSE
          linux-x86_64.zip
